---
version: 2
updates:
  - package-ecosystem: "github-actions"
    assignees:
      - "kernelsam"
    cooldown:
      default-days: 21
      exclude:
        - "senzing-factory/*"
    directory: "/"
    groups:
      senzing-factory:
        patterns:
          - "senzing-factory/*"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    assignees:
      - "arawinters"
    cooldown:
      default-days: 21
    directory: "/"
    allow:
      - dependency-type: "indirect"
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
    schedule:
      interval: "monthly"
